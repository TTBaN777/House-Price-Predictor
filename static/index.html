<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台北市租屋行情 AI 預測</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="gradient-bg p-6 text-white text-center">
            <h1 class="text-2xl font-bold">台北市租屋行情 AI 預測</h1>
            <p class="text-blue-100 mt-2">輸入房屋條件，由模型即時估價</p>
        </div>
        
        <form id="predictForm" class="p-8 space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">行政區</label>
                <select id="district" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="中正區">中正區</option>
                    <option value="大安區">大安區</option>
                    <option value="信義區">信義區</option>
                    <option value="中山區">中山區</option>
                    <option value="內湖區">內湖區</option>
                    <option value="士林區">士林區</option>
                    <option value="萬華區">萬華區</option>
                    <option value="北投區">北投區</option>
                    <option value="松山區">松山區</option>
                    <option value="南港區">南港區</option>
                    <option value="文山區">文山區</option>
                    <option value="大同區">大同區</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">坪數 (坪)</label>
                    <input type="number" id="size" step="0.1" value="10" class="w-full p-3 border border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">屋齡 (年)</label>
                    <input type="number" id="age" value="5" class="w-full p-3 border border-gray-300 rounded-lg">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">房間數</label>
                    <input type="number" id="rooms" value="1" class="w-full p-2 border border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">客廳數</label>
                    <input type="number" id="halls" value="1" class="w-full p-2 border border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">衛浴數</label>
                    <input type="number" id="bath" value="1" class="w-full p-2 border border-gray-300 rounded-lg">
                </div>
            </div>

            <button type="submit" class="w-full gradient-bg text-white font-bold py-3 rounded-xl hover:opacity-90 transition duration-300 shadow-lg">
                預測行情
            </button>
        </form>

        <div id="resultArea" class="hidden p-8 border-t border-gray-100 bg-gray-50 text-center">
            <p class="text-gray-500 text-sm">預測月租金約為</p>
            <div class="text-4xl font-black text-indigo-600 my-2">
                <span id="priceDisplay">0</span> <span class="text-xl">元</span>
            </div>
            <p class="text-xs text-gray-400">結果僅供參考</p>
        </div>
    </div>

    <script>
        document.getElementById('predictForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                district: document.getElementById('district').value,
                size: parseFloat(document.getElementById('size').value),
                rooms: parseInt(document.getElementById('rooms').value),
                halls: parseInt(document.getElementById('halls').value),
                bath: parseInt(document.getElementById('bath').value),
                age: parseFloat(document.getElementById('age').value)
            };

            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            document.getElementById('priceDisplay').innerText = result.predicted_price.toLocaleString();
            document.getElementById('resultArea').classList.remove('hidden');
        };
    </script>
</body>
</html>
